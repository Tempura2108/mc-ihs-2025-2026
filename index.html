<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irvington High School but in Minecraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/favicon-lime-shadow.png">

    <style>

        @font-face {
            font-family: 'Minecraft';
            src: url('fonts/Minecraft.ttf') format('truetype');
        }

        /* Default */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            /* background: #322d2b; */
            background: #000000;
            color: #f5f5f5;
            text-align: center;
        }
        h1 {
            font-family: "Bebas Neue", sans-serif;
            /* margin: 0; */
            text-align: center;
            font-size: 10rem;
        }
        main {
            padding: 2rem;
        }
        footer {
            margin-top: 3rem;
            padding: 1rem;
            background: #000000;
        }
        
        /* Hero  */
        .hero {
            position: relative;
            width: 100%;
            /* height:100%; */
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #000000;
            z-index: 0;
        }
        
        .hero img {
            position: absolute;
            top: 0px;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: -1;
        }
        
        .hero-text {
            font-family: 'Oswald', sans-serif;
            font-size: 4rem;
            color: #f5f5f5;
            text-shadow: 0 0 10px rgba(0,0,0,0.7);
            position: sticky;
            top: 20px;
            text-align: center;
            margin-top: 40vh;
        }
        .hero-subtext {
            font-family: 'Minecraft', sans-serif;
            font-size: 2.5rem;
            color: #f5f5f5;
            text-shadow: 0 0 10px rgba(0,0,0,0.7);
            position: sticky;
            text-align: center;
        }
        


        /* Header */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px 20px;
            background: #000000;
            display: flex;
            align-items: center;
            z-index: 1000;
        }
        
        .brand {
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        
        .logo {
            width: 40px;
            height: 40px;
            object-fit: cover;
            margin-right: 10px;
        }
        
        .site-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: #f5f5f5;
        }

    </style>
</head>
<body id="top">

    <header class="site-header">
        <a href="#top" class="brand">
            <img src="images/logo-lime-shadow.png" alt="logo" class="logo"> 
            <!-- <span class="site-name">My Website</span> -->
        </a>
    </header>

    <section class="hero">
        <img src="images/ihs-cave-center.jpg" alt="hero background image">
        <h1 class="hero-text">IRVINGTON HIGH SCHOOL</h1>
        <h2 class="hero-subtext">...but in Minecraft</h2>
    </section>

    
    <main>
        <h2>website under development or smth</h2>
        <p>will add more stuff and credits later...prolly</p>
    </main>

    <footer>
        <p>i need to create a location to share files directly within the district; others can buy a paid version or smth</p>
    </footer>
</body>
</html>
