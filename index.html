<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
<style>


	body {
            font-family: "Inter", sans-serif;
            /* background: #322d2b; */
            background: #000000;
            color: #f5f5f5;
            text-align: center;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* section {
            position: relative;
            width: 100%;
            height: 100svh;
        } */


.parallax-text {
	height:100vh;
    background-image: url('images/ihs-cave-center.jpg');
    display:flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background-attachment: fixed;
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover;
}
.parallax-text.unfixed {
    background-attachment: scroll;
}


.parallax-text h1 {
	font-family: "Oswald", sans-serif;
	color: #f5f5f5;
	font-size: 4rem;
    margin:0;
  }
.parallax-text h2 {
	font-family: "Inter", sans-serif;
	color: #f5f5f5;
	font-size: 2.5rem;
    margin:0;
  }

.parallax {
  /* The image used */
  background-image: url('images/ihs-cave-center.jpg');

  /* Full height */
  height: 100%; 

  /* Create the parallax scrolling effect */
  background-attachment: fixed;
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
}


</style>
</head>
<body>

<div class="parallax"></div>

<div class="parallax-text">
	<h1>words words words</h1>
    <h2>even more words</h2>
</div>

<div style="height:40rem;background-color:red;font-size:36px">
paragraphs
</div>

<script>
document.addEventListener("scroll", () => {
    const section = document.querySelector(".parallax-text");
    const rect = section.getBoundingClientRect();

    // If the bottom of the section hits the bottom of the viewport
    if (rect.bottom <= window.innerHeight) {
        section.classList.add("unfixed");
    } else {
        section.classList.remove("unfixed");
    }
});
</script>



</body>
</html>
