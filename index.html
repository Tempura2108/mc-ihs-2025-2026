<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irvington High School but in Minecraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/favicon-lime-shadow.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'Minecraft';
            src: url('fonts/Minecraft.ttf') format('truetype');
        }

        /* Default */
        body {
            font-family: "Inter", sans-serif;
            /* background: #322d2b; */
            background: #000000;
            color: #f5f5f5;
            text-align: center;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 {
            font-family: "Oswald", sans-serif;
            font-size: 4rem;
        }
        h2 {
            font-family: "Minecraft", sans-serif;
            font-size: 2.5rem;
        }

        section {
            position: relative;
            width: 100%;
            height: 100svh;
        }


        .hero-img, .hero-header{
            position: absolute;
            width: 100%;
            height: 100%;
            will-change: transform, opacity, width, height;
        }

        .hero-img {
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            overflow: hidden;
        }

        .hero-header{
            padding: 4rem;
            display:flex;
            alight-items: center;
        }

        .screenshots, .credits, .tools {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .screenshots {
            margin-top: 275svh;
        }

        .screenshot-images {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4rem;
        }

        @media (max-width: 1000px) {
            h1 {
                font-size: 3rem;
            }
            h2 {
                font-size: 1.5rem;
            }
            .hero{
                z-index: 2;
            }
            .hero-header {
                padding: 2rem;
            }
        }
        

    </style>
</head>
    
<body id="top">

    <section class="hero">
        <div class="hero-img">
            <img src="images/ihs-cave-center.jpg",alt="">
        </div>
        <div class="hero-header">
            <h1>IRVINGTON HIGH SCHOOL</h1>
            <h2>...but in Minecraft</h2>
        </div>
        
    </section>

    <section class="screenshots">
        <div class="screenshot-images">
            
        </div>
    </section>

    <section class="credits">
        <div class="credit-text">
            
        </div>
    </section>

    <section class="tools">
        <div class="tools-logo">
            
        </div>
    </section>

    <section class="outro">
        <div class="outro-text">
            
        </div>
    </section>

    

    
    <main>
        <h2>website under development or smth</h2>
        <p>will add more stuff and credits later...prolly</p>
    </main>

    <footer>
        <p>words</p>
    </footer>
</body>
</html>
